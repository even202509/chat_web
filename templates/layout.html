<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}VibeChat{% endblock %}</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="icon" href="/static/favicon.svg" />
  </head>
  <body class="bg-gray-50 text-gray-900">
    <div id="app" class="flex flex-col h-screen">
      <!-- Navbar -->
      <nav
        class="bg-white shadow-sm border-b border-gray-200 px-4 py-3 flex items-center justify-between"
      >
        <div class="text-xl font-semibold text-blue-600">VibeChat</div>
        {% if username %}
        <div class="flex items-center space-x-4">
          <span class="text-gray-700">{{ username }}</span>
          <a
            href="/logout"
            class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-md text-sm transition-colors"
          >
            Logout
          </a>
        </div>
        {% endif %}
      </nav>
      <!-- Main Content -->
      <main class="flex-1 overflow-hidden">{% block main %}{% endblock %}</main>
    </div>
    {% block script %}{% endblock %}
  </body>
</html>
